name: CI

on:
  pull_request:
    branches: [main, dev, v2]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (type check, lint, build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint (informational)
        run: npx eslint .
        continue-on-error: true

      - name: Build
        run: npm run build

  backend:
    name: Backend (Pint, PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, sqlite, pdo_sqlite, bcmath, curl, xml, dom
          coverage: none
          tools: composer:v2

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: Prepare test env
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            cat > .env <<'EOF'
          APP_NAME=Laravel
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:
          CACHE_STORE=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          EOF
          fi
          php artisan key:generate

      - name: Lint (Pint, informational)
        run: ./vendor/bin/pint --test
        continue-on-error: true

      - name: PHPUnit
        run: php artisan test
